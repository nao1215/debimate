baseURL = "https://debimate.jp/"
locale = "ja-jp"
defaultContentLanguage = "ja"
title = "Debimate"
theme = "PaperMod"
enableRobotsTXT = true
hasCJKLanguage = true
ignoreLogs = ['warning-goldmark-raw-html']
env = "production"
images = ["images/icon.jpg"]
publishDir = "public"
enableGitInfo = true

[services]
  [services.googleAnalytics]
    id = "G-CT6HRDERYM"

[languages]
  [languages.ja]
    label = "Japanese"
    locale = "ja-JP"
    weight = 1

[related]
  includeNewer = true
  threshold = 20
  toLower = true

  [[related.indices]]
    name = "series"
    weight = 120

  [[related.indices]]
    name = "tags"
    weight = 80

  [[related.indices]]
    name = "categories"
    weight = 60

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup.goldmark.renderer]
  unsafe = true

[pagination]
  pagerSize = 60
