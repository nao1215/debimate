<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">BASE I authorization sequence</title>
  <desc id="desc">Cardholder pays merchant, merchant sends authorization through acquirer and brand to issuer, and the response returns. Clearing comes later.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 12; ry: 12; }
      .life { stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 8 8; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 8; }
      .label { font: 600 20px -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .small { font: 500 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #0f172a; }
      .note { fill: #eff6ff; stroke: #3b82f6; stroke-width: 1.5; rx: 12; ry: 12; }
      .noteText { font: 500 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #1e3a8a; text-anchor: middle; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="620"/>

  <rect class="box" x="40" y="32" width="160" height="52"/>
  <rect class="box" x="280" y="32" width="160" height="52"/>
  <rect class="box" x="520" y="32" width="160" height="52"/>
  <rect class="box" x="760" y="32" width="160" height="52"/>
  <rect class="box" x="1000" y="32" width="160" height="52"/>

  <text class="label" x="120" y="65">Cardholder</text>
  <text class="label" x="360" y="65">Merchant</text>
  <text class="label" x="600" y="65">Acquirer</text>
  <text class="label" x="840" y="65">Brand</text>
  <text class="label" x="1080" y="65">Issuer</text>

  <line class="life" x1="120" y1="84" x2="120" y2="560"/>
  <line class="life" x1="360" y1="84" x2="360" y2="560"/>
  <line class="life" x1="600" y1="84" x2="600" y2="560"/>
  <line class="life" x1="840" y1="84" x2="840" y2="560"/>
  <line class="life" x1="1080" y1="84" x2="1080" y2="560"/>

  <path class="arrow" d="M 120 140 L 360 140"/>
  <text class="small" x="170" y="130">Pay with card</text>

  <path class="arrow" d="M 360 210 L 600 210"/>
  <text class="small" x="405" y="200">Authorization request</text>

  <path class="arrow" d="M 600 280 L 840 280"/>
  <text class="small" x="665" y="270">BASE I / ISO 8583</text>

  <path class="arrow" d="M 840 350 L 1080 350"/>
  <text class="small" x="905" y="340">BASE I / ISO 8583</text>

  <path class="arrow dashed" d="M 1080 420 L 840 420"/>
  <text class="small" x="930" y="410">Approve or decline</text>

  <path class="arrow dashed" d="M 840 470 L 600 470"/>
  <path class="arrow dashed" d="M 600 510 L 360 510"/>
  <text class="small" x="445" y="500">Result</text>

  <path class="arrow dashed" d="M 360 550 L 120 550"/>
  <text class="small" x="170" y="540">Purchase result</text>

  <rect class="note" x="390" y="112" width="420" height="54"/>
  <text class="noteText" x="600" y="145">Clearing comes later as a separate step</text>
</svg>
