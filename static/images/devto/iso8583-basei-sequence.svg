<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">BASE I authorization sequence</title>
  <desc id="desc">Cardholder pays merchant. Merchant sends the authorization through acquirer and brand to issuer, and the response returns. Clearing comes later.</desc>
  <rect x="0" y="0" width="1200" height="620" fill="#f8fafc"/>

  <rect x="40" y="32" width="160" height="52" rx="12" ry="12" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <rect x="280" y="32" width="160" height="52" rx="12" ry="12" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <rect x="520" y="32" width="160" height="52" rx="12" ry="12" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <rect x="760" y="32" width="160" height="52" rx="12" ry="12" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <rect x="1000" y="32" width="160" height="52" rx="12" ry="12" fill="#ffffff" stroke="#334155" stroke-width="2"/>

  <text x="120" y="65" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#0f172a">Cardholder</text>
  <text x="360" y="65" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#0f172a">Merchant</text>
  <text x="600" y="65" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#0f172a">Acquirer</text>
  <text x="840" y="65" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#0f172a">Brand</text>
  <text x="1080" y="65" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#0f172a">Issuer</text>

  <line x1="120" y1="84" x2="120" y2="560" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="360" y1="84" x2="360" y2="560" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="600" y1="84" x2="600" y2="560" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="840" y1="84" x2="840" y2="560" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="1080" y1="84" x2="1080" y2="560" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 8"/>

  <rect x="390" y="112" width="420" height="54" rx="12" ry="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="600" y="145" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#1e3a8a">Clearing comes later as a separate step</text>

  <line x1="120" y1="140" x2="347" y2="140" stroke="#334155" stroke-width="2.5"/>
  <polygon points="347,140 335,134 335,146" fill="#334155"/>
  <text x="205" y="128" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#0f172a">Pay with card</text>

  <line x1="360" y1="210" x2="587" y2="210" stroke="#334155" stroke-width="2.5"/>
  <polygon points="587,210 575,204 575,216" fill="#334155"/>
  <text x="430" y="198" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#0f172a">Authorization request</text>

  <line x1="600" y1="280" x2="827" y2="280" stroke="#334155" stroke-width="2.5"/>
  <polygon points="827,280 815,274 815,286" fill="#334155"/>
  <text x="675" y="268" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#0f172a">BASE I / ISO 8583</text>

  <line x1="840" y1="350" x2="1067" y2="350" stroke="#334155" stroke-width="2.5"/>
  <polygon points="1067,350 1055,344 1055,356" fill="#334155"/>
  <text x="915" y="338" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#0f172a">BASE I / ISO 8583</text>

  <line x1="1080" y1="420" x2="853" y2="420" stroke="#334155" stroke-width="2.5" stroke-dasharray="8 8"/>
  <polygon points="853,420 865,414 865,426" fill="#334155"/>
  <text x="910" y="408" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#0f172a">Approve or decline</text>

  <line x1="840" y1="470" x2="613" y2="470" stroke="#334155" stroke-width="2.5" stroke-dasharray="8 8"/>
  <polygon points="613,470 625,464 625,476" fill="#334155"/>

  <line x1="600" y1="510" x2="373" y2="510" stroke="#334155" stroke-width="2.5" stroke-dasharray="8 8"/>
  <polygon points="373,510 385,504 385,516" fill="#334155"/>
  <text x="450" y="498" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#0f172a">Result</text>

  <line x1="360" y1="550" x2="133" y2="550" stroke="#334155" stroke-width="2.5" stroke-dasharray="8 8"/>
  <polygon points="133,550 145,544 145,556" fill="#334155"/>
  <text x="205" y="538" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#0f172a">Purchase result</text>
</svg>
