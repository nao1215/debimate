<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">ISO 8583 basic structure</title>
  <desc id="desc">An ISO 8583 message consists of MTI, bitmap, and data elements such as PAN, amount, ICC data, and many other fields.</desc>
  <rect x="0" y="0" width="1200" height="420" fill="#f8fafc"/>

  <rect x="70" y="140" width="240" height="90" rx="14" ry="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="190" y="183" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#0f172a">ISO 8583 message</text>
  <text x="190" y="211" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500" fill="#475569">one packed transaction message</text>

  <rect x="430" y="40" width="260" height="82" rx="14" ry="14" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <rect x="430" y="170" width="260" height="82" rx="14" ry="14" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <rect x="430" y="300" width="260" height="82" rx="14" ry="14" fill="#ffffff" stroke="#334155" stroke-width="2"/>

  <text x="560" y="88" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#0f172a">MTI</text>
  <text x="560" y="114" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500" fill="#475569">what kind of message this is</text>

  <text x="560" y="218" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#0f172a">Bitmap</text>
  <text x="560" y="244" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500" fill="#475569">which fields are present</text>

  <text x="560" y="348" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#0f172a">Data elements</text>
  <text x="560" y="374" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500" fill="#475569">the actual payload</text>

  <line x1="310" y1="185" x2="418" y2="81" stroke="#334155" stroke-width="2.5"/>
  <polygon points="418,81 406,77 410,89" fill="#334155"/>
  <line x1="310" y1="185" x2="418" y2="211" stroke="#334155" stroke-width="2.5"/>
  <polygon points="418,211 406,205 406,217" fill="#334155"/>
  <line x1="310" y1="185" x2="418" y2="341" stroke="#334155" stroke-width="2.5"/>
  <polygon points="418,341 407,334 417,327" fill="#334155"/>

  <rect x="820" y="40" width="260" height="62" rx="12" ry="12" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <rect x="820" y="130" width="260" height="62" rx="12" ry="12" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <rect x="820" y="220" width="260" height="62" rx="12" ry="12" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <rect x="820" y="310" width="260" height="62" rx="12" ry="12" fill="#ffffff" stroke="#334155" stroke-width="2"/>

  <text x="950" y="79" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#0f172a">F2 PAN</text>
  <text x="950" y="169" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#0f172a">F4 Amount</text>
  <text x="950" y="259" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#0f172a">F55 ICC data</text>
  <text x="950" y="349" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#0f172a">Other fields</text>

  <line x1="690" y1="341" x2="808" y2="71" stroke="#334155" stroke-width="2.5"/>
  <polygon points="808,71 804,84 792,79" fill="#334155"/>
  <line x1="690" y1="341" x2="808" y2="161" stroke="#334155" stroke-width="2.5"/>
  <polygon points="808,161 804,174 792,167" fill="#334155"/>
  <line x1="690" y1="341" x2="808" y2="251" stroke="#334155" stroke-width="2.5"/>
  <polygon points="808,251 804,264 792,257" fill="#334155"/>
  <line x1="690" y1="341" x2="808" y2="341" stroke="#334155" stroke-width="2.5"/>
  <polygon points="808,341 796,335 796,347" fill="#334155"/>
</svg>
