<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">ISO 8583 basic structure</title>
  <desc id="desc">An ISO 8583 message consists of MTI, bitmap, and data elements. Common data elements include PAN, amount, ICC data, and other fields.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 14; ry: 14; }
      .accent { fill: #eff6ff; stroke: #2563eb; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .label { font: 600 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .small { font: 500 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #475569; text-anchor: middle; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="420"/>

  <rect class="box accent" x="70" y="140" width="240" height="90"/>
  <text class="label" x="190" y="182">ISO 8583 message</text>
  <text class="small" x="190" y="210">one packed transaction message</text>

  <rect class="box" x="430" y="40" width="260" height="82"/>
  <text class="label" x="560" y="86">MTI</text>
  <text class="small" x="560" y="112">what kind of message this is</text>

  <rect class="box" x="430" y="170" width="260" height="82"/>
  <text class="label" x="560" y="216">Bitmap</text>
  <text class="small" x="560" y="242">which fields are present</text>

  <rect class="box" x="430" y="300" width="260" height="82"/>
  <text class="label" x="560" y="346">Data elements</text>
  <text class="small" x="560" y="372">the actual payload</text>

  <path class="line" d="M 310 185 L 430 81"/>
  <path class="line" d="M 310 185 L 430 211"/>
  <path class="line" d="M 310 185 L 430 341"/>

  <rect class="box" x="820" y="40" width="260" height="62"/>
  <rect class="box" x="820" y="130" width="260" height="62"/>
  <rect class="box" x="820" y="220" width="260" height="62"/>
  <rect class="box" x="820" y="310" width="260" height="62"/>

  <text class="label" x="950" y="79">F2 PAN</text>
  <text class="label" x="950" y="169">F4 Amount</text>
  <text class="label" x="950" y="259">F55 ICC data</text>
  <text class="label" x="950" y="349">Other fields</text>

  <path class="line" d="M 690 341 L 820 71"/>
  <path class="line" d="M 690 341 L 820 161"/>
  <path class="line" d="M 690 341 L 820 251"/>
  <path class="line" d="M 690 341 L 820 341"/>
</svg>
