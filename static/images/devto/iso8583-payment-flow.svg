<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">Card payment message flow</title>
  <desc id="desc">Request flows from cardholder to issuer through merchant, acquirer, and brand. The response flows back the same way.</desc>
  <rect x="0" y="0" width="1200" height="280" fill="#f8fafc"/>

  <text x="600" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500" fill="#475569">Authorization request</text>
  <text x="600" y="236" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500" fill="#475569">Approval or decline over the same path</text>

  <rect x="35" y="78" width="180" height="64" rx="14" ry="14" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <rect x="265" y="78" width="180" height="64" rx="14" ry="14" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <rect x="495" y="78" width="180" height="64" rx="14" ry="14" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <rect x="725" y="78" width="180" height="64" rx="14" ry="14" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <rect x="955" y="78" width="180" height="64" rx="14" ry="14" fill="#ffffff" stroke="#334155" stroke-width="2"/>

  <text x="125" y="118" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#0f172a">Cardholder</text>
  <text x="355" y="118" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#0f172a">Merchant</text>
  <text x="585" y="118" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#0f172a">Acquirer</text>
  <text x="815" y="118" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#0f172a">Brand</text>
  <text x="1045" y="118" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#0f172a">Issuer</text>

  <line x1="228" y1="110" x2="252" y2="110" stroke="#334155" stroke-width="3"/>
  <polygon points="218,110 232,103 232,117" fill="#334155"/>
  <polygon points="262,110 248,103 248,117" fill="#334155"/>

  <line x1="458" y1="110" x2="482" y2="110" stroke="#334155" stroke-width="3"/>
  <polygon points="448,110 462,103 462,117" fill="#334155"/>
  <polygon points="492,110 478,103 478,117" fill="#334155"/>

  <line x1="688" y1="110" x2="712" y2="110" stroke="#334155" stroke-width="3"/>
  <polygon points="678,110 692,103 692,117" fill="#334155"/>
  <polygon points="722,110 708,103 708,117" fill="#334155"/>

  <line x1="918" y1="110" x2="942" y2="110" stroke="#334155" stroke-width="3"/>
  <polygon points="908,110 922,103 922,117" fill="#334155"/>
  <polygon points="952,110 938,103 938,117" fill="#334155"/>
</svg>
