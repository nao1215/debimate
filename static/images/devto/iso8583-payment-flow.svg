<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">Card payment message flow</title>
  <desc id="desc">Request flows from cardholder to issuer through merchant, acquirer, and brand. Response flows back the same way.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 14; ry: 14; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .label { font: 600 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .small { font: 500 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #475569; text-anchor: middle; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="280"/>

  <text class="small" x="600" y="48">Authorization request</text>
  <text class="small" x="600" y="232">Approval or decline</text>

  <rect class="box" x="35" y="78" width="180" height="64"/>
  <rect class="box" x="265" y="78" width="180" height="64"/>
  <rect class="box" x="495" y="78" width="180" height="64"/>
  <rect class="box" x="725" y="78" width="180" height="64"/>
  <rect class="box" x="955" y="78" width="180" height="64"/>

  <text class="label" x="125" y="118">Cardholder</text>
  <text class="label" x="355" y="118">Merchant</text>
  <text class="label" x="585" y="118">Acquirer</text>
  <text class="label" x="815" y="118">Brand</text>
  <text class="label" x="1045" y="118">Issuer</text>

  <path class="line" d="M 215 110 L 265 110"/>
  <path class="line" d="M 445 110 L 495 110"/>
  <path class="line" d="M 675 110 L 725 110"/>
  <path class="line" d="M 905 110 L 955 110"/>

  <path class="line" d="M 955 182 L 905 182"/>
  <path class="line" d="M 725 182 L 675 182"/>
  <path class="line" d="M 495 182 L 445 182"/>
  <path class="line" d="M 265 182 L 215 182"/>
</svg>
